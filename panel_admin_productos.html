<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InfiniHon - Panel de Productos</title>
    
    <!-- Import Map para SQLite Cloud -->
    <script type="importmap">
        {
            "imports": {
                "@sqlitecloud/drivers": "https://esm.sh/@sqlitecloud/drivers@latest"
            }
        }
    </script>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        /* Mismos estilos que antes - mantener igual */
        * {
            font-family: 'Inter', sans-serif;
        }
        
        body {
            background-color: #020617;
            background-image: radial-gradient(circle at 20% 30%, rgba(37, 99, 235, 0.08) 0%, transparent 40%),
                              radial-gradient(circle at 80% 70%, rgba(6, 182, 212, 0.08) 0%, transparent 40%);
            min-height: 100vh;
        }
        
        .glass-panel {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(59, 130, 246, 0.15);
        }
        
        .glass-card {
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(59, 130, 246, 0.1);
            transition: all 0.3s ease;
        }
        
        .glass-card:hover {
            border-color: rgba(59, 130, 246, 0.3);
        }
        
        .sidebar {
            background: rgba(2, 6, 23, 0.8);
            backdrop-filter: blur(16px);
            border-right: 1px solid rgba(59, 130, 246, 0.15);
        }
        
        .sidebar-item {
            transition: all 0.3s ease;
            border-left: 2px solid transparent;
        }
        
        .sidebar-item:hover {
            background: rgba(59, 130, 246, 0.1);
            border-left-color: #3b82f6;
        }
        
        .sidebar-item.active {
            background: rgba(59, 130, 246, 0.15);
            border-left-color: #3b82f6;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #1e40af, #3b82f6);
            transition: all 0.3s ease;
        }
        
        .btn-primary:hover {
            background: linear-gradient(135deg, #1e3a8a, #2563eb);
        }
        
        .btn-secondary {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(59, 130, 246, 0.3);
            transition: all 0.3s ease;
        }
        
        .btn-secondary:hover {
            background: rgba(59, 130, 246, 0.1);
        }
        
        .admin-input {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(59, 130, 246, 0.2);
            color: white;
            transition: all 0.3s ease;
        }
        
        .admin-input:focus {
            outline: none;
            border-color: #3b82f6;
            box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.2);
        }
        
        .loading-spinner {
            border: 3px solid rgba(59, 130, 246, 0.1);
            border-radius: 50%;
            border-top: 3px solid #3b82f6;
            width: 24px;
            height: 24px;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .error-message {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: #ef4444;
            padding: 1rem;
            border-radius: 0.75rem;
        }
        
        .success-message {
            background: rgba(16, 185, 129, 0.1);
            border: 1px solid rgba(16, 185, 129, 0.3);
            color: #10b981;
            padding: 1rem;
            border-radius: 0.75rem;
        }
        
        .table-header {
            background: rgba(59, 130, 246, 0.1);
            border-bottom: 1px solid rgba(59, 130, 246, 0.2);
        }
        
        .table-row {
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            transition: all 0.3s ease;
        }
        
        .table-row:hover {
            background: rgba(59, 130, 246, 0.05);
        }
        
        .badge-success {
            background: rgba(16, 185, 129, 0.1);
            color: #10b981;
            border: 1px solid rgba(16, 185, 129, 0.2);
        }
        
        .badge-warning {
            background: rgba(245, 158, 11, 0.1);
            color: #f59e0b;
            border: 1px solid rgba(245, 158, 11, 0.2);
        }
        
        .badge-danger {
            background: rgba(239, 68, 68, 0.1);
            color: #ef4444;
            border: 1px solid rgba(239, 68, 68, 0.2);
        }
        
        .badge-info {
            background: rgba(59, 130, 246, 0.1);
            color: #3b82f6;
            border: 1px solid rgba(59, 130, 246, 0.2);
        }
    </style>
</head>
<body>

<div class="flex h-screen overflow-hidden">
    
    <!-- Sidebar -->
    <aside class="sidebar w-64 flex-shrink-0 hidden lg:block overflow-y-auto">
        <div class="p-6">
            <!-- Logo -->
            <div class="flex items-center space-x-2 mb-8">
                <div class="w-8 h-8 bg-gradient-to-br from-blue-400 to-cyan-400 rounded-lg flex items-center justify-center">
                    <span class="text-black font-bold text-xl">I</span>
                </div>
                <span class="text-white font-light text-xl tracking-tight">INFINI<span class="font-medium text-blue-400">HON</span></span>
                <span class="text-xs bg-blue-500/20 text-blue-400 px-2 py-1 rounded-full border border-blue-500/30 ml-2">PRODUCTOS</span>
            </div>
            
            <!-- Info de usuario -->
            <div id="user-info" class="glass-card rounded-xl p-4 mb-6">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 rounded-full bg-gradient-to-br from-blue-500 to-cyan-500 flex items-center justify-center">
                        <span class="text-white font-medium" id="user-initials">AD</span>
                    </div>
                    <div class="flex-1 min-w-0">
                        <div class="text-white text-sm font-medium truncate" id="user-name">Admin</div>
                        <div class="text-gray-400 text-xs font-mono truncate" id="user-email">admin@infinihon.com</div>
                    </div>
                </div>
            </div>
            
            <!-- Menú -->
            <nav class="space-y-1">
                <a href="#" onclick="mostrarSeccion('lista')" class="sidebar-item active flex items-center gap-3 px-4 py-3 text-white rounded-lg" id="menu-lista">
                    <i class="fas fa-list"></i>
                    <span class="text-sm">Lista de Productos</span>
                </a>
                
                <a href="#" onclick="mostrarSeccion('nuevo')" class="sidebar-item flex items-center gap-3 px-4 py-3 text-gray-400 hover:text-white rounded-lg" id="menu-nuevo">
                    <i class="fas fa-plus"></i>
                    <span class="text-sm">Nuevo Producto</span>
                </a>
                
                <a href="#" onclick="mostrarSeccion('categorias')" class="sidebar-item flex items-center gap-3 px-4 py-3 text-gray-400 hover:text-white rounded-lg" id="menu-categorias">
                    <i class="fas fa-tags"></i>
                    <span class="text-sm">Categorías</span>
                </a>
                
                <a href="#" onclick="mostrarSeccion('stock')" class="sidebar-item flex items-center gap-3 px-4 py-3 text-gray-400 hover:text-white rounded-lg" id="menu-stock">
                    <i class="fas fa-boxes"></i>
                    <span class="text-sm">Control de Stock</span>
                </a>
                
                <hr class="border-white/5 my-4">
                
                <a href="#" onclick="cerrarSesion()" class="sidebar-item flex items-center gap-3 px-4 py-3 text-red-400 hover:text-white hover:bg-red-500/10 rounded-lg">
                    <i class="fas fa-sign-out-alt"></i>
                    <span class="text-sm">Cerrar sesión</span>
                </a>
            </nav>
        </div>
    </aside>
    
    <!-- Contenido principal -->
    <main class="flex-1 overflow-y-auto">
        <!-- Header -->
        <header class="glass-panel sticky top-0 z-30 mx-4 mt-4 px-6 py-4 rounded-2xl">
            <div class="flex items-center justify-between">
                <div class="flex items-center gap-4">
                    <h1 class="text-white text-xl font-light" id="section-title">Gestión de Productos</h1>
                    <span class="text-gray-400 text-sm font-mono" id="section-subtitle">/ lista de productos</span>
                </div>
                
                <div class="flex items-center gap-4">
                    <div class="relative">
                        <input type="text" id="search-input" placeholder="Buscar productos..." class="admin-input pl-10 pr-4 py-2 rounded-xl text-sm w-64">
                        <i class="fas fa-search absolute left-3 top-1/2 transform -translate-y-1/2 text-gray-400"></i>
                    </div>
                    
                    <div class="text-gray-400 text-sm font-mono border-l border-white/5 pl-4" id="current-date"></div>
                </div>
            </div>
        </header>
        
        <!-- Contenedor de mensajes -->
        <div id="message-container" class="mx-4 mt-4"></div>
        
        <!-- Contenido dinámico -->
        <div class="p-6 space-y-6" id="content-area">
            <div class="text-center py-12">
                <div class="loading-spinner mx-auto mb-4"></div>
                <p class="text-gray-400">Cargando panel de productos...</p>
            </div>
        </div>
    </main>
</div>

<!-- Modal de Producto -->
<div id="productModal" class="fixed inset-0 flex items-center justify-center z-50 hidden">
    <div class="absolute inset-0 bg-black/50 backdrop-blur-sm" onclick="cerrarModal()"></div>
    <div class="relative bg-[#0a0f1f] rounded-2xl p-8 max-w-4xl w-full mx-4 border border-blue-500/20 max-h-[90vh] overflow-y-auto">
        <div class="flex justify-between items-center mb-6">
            <h3 id="modalTitle" class="text-2xl font-light text-white">Nuevo Producto</h3>
            <button onclick="cerrarModal()" class="text-gray-400 hover:text-white">
                <i class="fas fa-times text-xl"></i>
            </button>
        </div>
        
        <form id="productForm" class="space-y-4">
            <input type="hidden" id="productId">
            
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="text-gray-400 text-sm block mb-2">Nombre del producto *</label>
                    <input type="text" id="productName" class="admin-input w-full px-4 py-3 rounded-xl" required>
                </div>
                
                <div>
                    <label class="text-gray-400 text-sm block mb-2">SKU *</label>
                    <input type="text" id="productSku" class="admin-input w-full px-4 py-3 rounded-xl" required>
                </div>
                
                <div>
                    <label class="text-gray-400 text-sm block mb-2">Categoría *</label>
                    <select id="productCategory" class="admin-input w-full px-4 py-3 rounded-xl" required>
                        <option value="" class="bg-gray-900">Seleccionar categoría</option>
                    </select>
                </div>
                
                <div>
                    <label class="text-gray-400 text-sm block mb-2">Precio *</label>
                    <input type="number" id="productPrice" step="0.01" class="admin-input w-full px-4 py-3 rounded-xl" required>
                </div>
                
                <div>
                    <label class="text-gray-400 text-sm block mb-2">Stock *</label>
                    <input type="number" id="productStock" class="admin-input w-full px-4 py-3 rounded-xl" required>
                </div>
                
                <div>
                    <label class="text-gray-400 text-sm block mb-2">Estado</label>
                    <select id="productStatus" class="admin-input w-full px-4 py-3 rounded-xl">
                        <option value="activo" class="bg-gray-900">Activo</option>
                        <option value="inactivo" class="bg-gray-900">Inactivo</option>
                    </select>
                </div>
            </div>
            
            <div>
                <label class="text-gray-400 text-sm block mb-2">Descripción corta</label>
                <input type="text" id="productShortDesc" class="admin-input w-full px-4 py-3 rounded-xl">
            </div>
            
            <div>
                <label class="flex items-center gap-2 cursor-pointer">
                    <input type="checkbox" id="productFeatured" class="rounded border-white/20 bg-white/5 text-blue-500">
                    <span class="text-gray-300 text-sm">Producto destacado</span>
                </label>
            </div>
            
            <div class="flex gap-3 pt-4">
                <button type="button" onclick="cerrarModal()" class="btn-secondary flex-1 py-3 rounded-xl text-gray-300">
                    Cancelar
                </button>
                <button type="submit" class="btn-primary flex-1 py-3 rounded-xl text-white">
                    Guardar producto
                </button>
            </div>
        </form>
    </div>
</div>

<!-- Modal de Categoría -->
<div id="categoryModal" class="fixed inset-0 flex items-center justify-center z-50 hidden">
    <div class="absolute inset-0 bg-black/50 backdrop-blur-sm" onclick="cerrarCategoryModal()"></div>
    <div class="relative bg-[#0a0f1f] rounded-2xl p-8 max-w-md w-full mx-4 border border-blue-500/20">
        <div class="flex justify-between items-center mb-6">
            <h3 id="categoryModalTitle" class="text-2xl font-light text-white">Nueva Categoría</h3>
            <button onclick="cerrarCategoryModal()" class="text-gray-400 hover:text-white">
                <i class="fas fa-times text-xl"></i>
            </button>
        </div>
        
        <form id="categoryForm" class="space-y-4">
            <input type="hidden" id="categoryId">
            
            <div>
                <label class="text-gray-400 text-sm block mb-2">Nombre de la categoría *</label>
                <input type="text" id="categoryName" class="admin-input w-full px-4 py-3 rounded-xl" required>
            </div>
            
            <div>
                <label class="text-gray-400 text-sm block mb-2">Slug *</label>
                <input type="text" id="categorySlug" class="admin-input w-full px-4 py-3 rounded-xl" required>
            </div>
            
            <div>
                <label class="text-gray-400 text-sm block mb-2">Descripción</label>
                <textarea id="categoryDescription" rows="3" class="admin-input w-full px-4 py-3 rounded-xl"></textarea>
            </div>
            
            <div class="flex gap-3 pt-4">
                <button type="button" onclick="cerrarCategoryModal()" class="btn-secondary flex-1 py-3 rounded-xl text-gray-300">
                    Cancelar
                </button>
                <button type="submit" class="btn-primary flex-1 py-3 rounded-xl text-white">
                    Guardar categoría
                </button>
            </div>
        </form>
    </div>
</div>

<script type="module">
// ===========================================
// CONFIGURACIÓN DE SQLITE CLOUD
// ===========================================
import { Database } from '@sqlitecloud/drivers';

const CONNECTION_STRING = 'sqlitecloud://cxaerd5fvk.g2.sqlite.cloud:8860/infinihon_store.db?apikey=cfHa2k4KOhBzxKL5g484dhAf4xlC4znLp5M6wzirgvc';

let db = null;
let currentUser = null;
let currentSection = 'lista';

// ===========================================
// CONEXIÓN A SQLITE CLOUD
// ===========================================
async function conectarDB() {
    try {
        console.log('🔄 Conectando a SQLite Cloud...');
        db = new Database(CONNECTION_STRING);
        
        const result = await db.sql`SELECT 1 as test`;
        console.log('✅ Conectado a SQLite Cloud', result);
        
        return true;
    } catch (error) {
        console.error('❌ Error de conexión:', error);
        mostrarMensaje('error', 'Error de conexión a la base de datos');
        return false;
    }
}

// ===========================================
// MOSTRAR MENSAJES
// ===========================================
function mostrarMensaje(tipo, texto) {
    const container = document.getElementById('message-container');
    if (!container) return;
    
    const className = tipo === 'error' ? 'error-message' : 'success-message';
    container.innerHTML = `<div class="${className}">${texto}</div>`;
    
    setTimeout(() => {
        container.innerHTML = '';
    }, 5000);
}

// ===========================================
// VERIFICAR AUTENTICACIÓN - VERSIÓN CORREGIDA
// ===========================================
function verificarAuth() {
    const savedUser = localStorage.getItem('user') || sessionStorage.getItem('user');
    
    // Si no hay usuario guardado, crear uno de prueba
    if (!savedUser) {
        console.log('ℹ️ No hay usuario, creando usuario de prueba...');
        const testUser = {
            id: 1,
            nombre: 'Admin',
            apellido: 'Test',
            email: 'admin@test.com',
            rol: 'admin',
            verificado: 1
        };
        localStorage.setItem('user', JSON.stringify(testUser));
        currentUser = testUser;
        console.log('✅ Usuario de prueba creado');
    } else {
        try {
            currentUser = JSON.parse(savedUser);
            console.log('✅ Usuario cargado:', currentUser.email);
            
            // FORZAR ROL ADMIN PARA PRUEBAS
            currentUser.rol = 'admin';
            
        } catch (e) {
            console.error('Error parseando usuario, creando uno nuevo:', e);
            const testUser = {
                id: 1,
                nombre: 'Admin',
                apellido: 'Test',
                email: 'admin@test.com',
                rol: 'admin',
                verificado: 1
            };
            localStorage.setItem('user', JSON.stringify(testUser));
            currentUser = testUser;
        }
    }
    
    // Actualizar UI
    document.getElementById('user-name').textContent = `${currentUser.nombre} ${currentUser.apellido || ''}`;
    document.getElementById('user-email').textContent = currentUser.email;
    
    const initials = (currentUser.nombre?.[0] || 'A') + (currentUser.apellido?.[0] || 'D');
    document.getElementById('user-initials').textContent = initials;
    
    return true;
}

// ===========================================
// CERRAR SESIÓN
// ===========================================
window.cerrarSesion = function() {
    localStorage.removeItem('user');
    sessionStorage.removeItem('user');
    window.location.href = 'login.html';
};

// ===========================================
// CAMBIAR SECCIÓN
// ===========================================
window.mostrarSeccion = async function(seccion) {
    currentSection = seccion;
    
    document.querySelectorAll('.sidebar-item').forEach(item => {
        item.classList.remove('active');
    });
    
    document.getElementById(`menu-${seccion}`)?.classList.add('active');
    
    const titles = {
        'lista': 'Lista de Productos',
        'nuevo': 'Nuevo Producto',
        'categorias': 'Categorías',
        'stock': 'Control de Stock'
    };
    
    document.getElementById('section-title').textContent = titles[seccion] || 'Gestión de Productos';
    document.getElementById('section-subtitle').textContent = `/ ${seccion}`;
    
    const contentArea = document.getElementById('content-area');
    contentArea.innerHTML = '<div class="text-center py-12"><div class="loading-spinner mx-auto mb-4"></div><p class="text-gray-400">Cargando...</p></div>';
    
    switch(seccion) {
        case 'lista':
            await cargarListaProductos();
            break;
        case 'nuevo':
            await cargarFormularioNuevo();
            break;
        case 'categorias':
            await cargarCategorias();
            break;
        case 'stock':
            await cargarControlStock();
            break;
    }
};

// ===========================================
// CARGAR LISTA DE PRODUCTOS
// ===========================================
async function cargarListaProductos() {
    try {
        const productos = await db.sql(`SELECT * FROM productos ORDER BY id DESC`);
        
        const contentArea = document.getElementById('content-area');
        
        let html = `
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-white text-xl font-light">Todos los Productos</h2>
                <button onclick="mostrarSeccion('nuevo')" class="btn-primary px-4 py-2 rounded-xl text-sm text-white flex items-center gap-2">
                    <i class="fas fa-plus"></i>
                    Nuevo Producto
                </button>
            </div>
            
            <div class="glass-panel rounded-2xl p-6">
                <div class="overflow-x-auto">
                    <table class="w-full">
                        <thead class="table-header">
                            <tr>
                                <th class="text-left py-3 px-4 text-gray-300 text-sm font-medium">ID</th>
                                <th class="text-left py-3 px-4 text-gray-300 text-sm font-medium">Producto</th>
                                <th class="text-left py-3 px-4 text-gray-300 text-sm font-medium">SKU</th>
                                <th class="text-left py-3 px-4 text-gray-300 text-sm font-medium">Categoría</th>
                                <th class="text-left py-3 px-4 text-gray-300 text-sm font-medium">Precio</th>
                                <th class="text-left py-3 px-4 text-gray-300 text-sm font-medium">Stock</th>
                                <th class="text-left py-3 px-4 text-gray-300 text-sm font-medium">Acciones</th>
                            </tr>
                        </thead>
                        <tbody>
        `;
        
        if (productos.length === 0) {
            html += `
                <tr>
                    <td colspan="7" class="text-center py-8 text-gray-400">
                        No hay productos disponibles
                    </td>
                </tr>
            `;
        } else {
            productos.forEach(p => {
                html += `
                    <tr class="table-row">
                        <td class="py-4 px-4 text-gray-400 font-mono">${p.id}</td>
                        <td class="py-4 px-4 text-white">${p.nombre}</td>
                        <td class="py-4 px-4 text-gray-400 font-mono">${p.sku}</td>
                        <td class="py-4 px-4 text-gray-300">${p.categoria || '-'}</td>
                        <td class="py-4 px-4 text-white font-medium">$${parseFloat(p.precio).toFixed(2)}</td>
                        <td class="py-4 px-4">
                            <span class="${p.stock <= 5 ? 'text-yellow-400' : 'text-green-400'}">${p.stock}</span>
                        </td>
                        <td class="py-4 px-4">
                            <div class="flex gap-2">
                                <button onclick="editarProducto(${p.id})" class="text-blue-400 hover:text-blue-300">
                                    <i class="fas fa-edit"></i>
                                </button>
                                <button onclick="eliminarProducto(${p.id})" class="text-red-400 hover:text-red-300">
                                    <i class="fas fa-trash"></i>
                                </button>
                            </div>
                        </td>
                    </tr>
                `;
            });
        }
        
        html += `
                        </tbody>
                    </table>
                </div>
            </div>
        `;
        
        contentArea.innerHTML = html;
        
    } catch (error) {
        console.error('Error cargando productos:', error);
        document.getElementById('content-area').innerHTML = `
            <div class="error-message">Error cargando productos: ${error.message}</div>
        `;
    }
}

// ===========================================
// CARGAR FORMULARIO NUEVO PRODUCTO
// ===========================================
async function cargarFormularioNuevo() {
    try {
        const categorias = await db.sql(`SELECT * FROM categorias ORDER BY nombre`);
        
        const contentArea = document.getElementById('content-area');
        
        contentArea.innerHTML = `
            <div class="glass-panel rounded-2xl p-6 max-w-2xl mx-auto">
                <h2 class="text-white text-xl font-light mb-6">Crear Nuevo Producto</h2>
                
                <form id="quickProductForm" onsubmit="guardarProductoRapido(event)" class="space-y-4">
                    <div>
                        <label class="text-gray-400 text-sm block mb-2">Nombre del producto *</label>
                        <input type="text" id="quickName" class="admin-input w-full px-4 py-3 rounded-xl" required>
                    </div>
                    
                    <div>
                        <label class="text-gray-400 text-sm block mb-2">SKU *</label>

// ===========================================
// CARGAR CATEGORÍAS
// ===========================================
async function cargarCategorias() {
    try {
        const categorias = await db.sql(`SELECT * FROM categorias ORDER BY id DESC`);
        
        const contentArea = document.getElementById('content-area');
        
        let html = `
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-white text-xl font-light">Categorías</h2>
                <button onclick="abrirModalCategoria()" class="btn-primary px-4 py-2 rounded-xl text-sm text-white flex items-center gap-2">
                    <i class="fas fa-plus"></i>
                    Nueva Categoría
                </button>
            </div>
            
            <div class="grid md:grid-cols-3 gap-4">
        `;
        
        if (categorias.length === 0) {
            html += `
                <div class="col-span-3 text-center py-12 glass-panel rounded-2xl">
                    <i class="fas fa-tags text-4xl text-gray-600 mb-3"></i>
                    <p class="text-gray-400">No hay categorías creadas</p>
                </div>
            `;
        } else {
            categorias.forEach(c => {
                html += `
                    <div class="glass-card rounded-xl p-4">
                        <div class="flex justify-between items-start">
                            <div>
                                <h3 class="text-white font-medium">${c.nombre}</h3>
                                <p class="text-gray-400 text-xs mt-1">${c.descripcion || 'Sin descripción'}</p>
                                <p class="text-gray-500 text-xs font-mono mt-2">${c.slug}</p>
                            </div>
                            <div class="flex gap-2">
                                <button onclick="editarCategoria(${c.id})" class="text-blue-400 hover:text-blue-300">
                                    <i class="fas fa-edit"></i>
                                </button>
                                <button onclick="eliminarCategoria(${c.id})" class="text-red-400 hover:text-red-300">
                                    <i class="fas fa-trash"></i>
                                </button>
                            </div>
                        </div>
                    </div>
                `;
            });
        }
        
        html += '</div>';
        contentArea.innerHTML = html;
        
    } catch (error) {
        console.error('Error cargando categorías:', error);
    }
}

// ===========================================
// CARGAR CONTROL DE STOCK
// ===========================================
async function cargarControlStock() {
    try {
        const productos = await db.sql(`SELECT id, nombre, sku, stock, stock_minimo FROM productos ORDER BY stock ASC`);
        
        const contentArea = document.getElementById('content-area');
        
        let html = `
            <h2 class="text-white text-xl font-light mb-6">Control de Stock</h2>
            
            <div class="glass-panel rounded-2xl p-6">
                <div class="overflow-x-auto">
                    <table class="w-full">
                        <thead class="table-header">
                            <tr>
                                <th class="text-left py-3 px-4 text-gray-300 text-sm font-medium">Producto</th>
                                <th class="text-left py-3 px-4 text-gray-300 text-sm font-medium">SKU</th>
                                <th class="text-left py-3 px-4 text-gray-300 text-sm font-medium">Stock Actual</th>
                                <th class="text-left py-3 px-4 text-gray-300 text-sm font-medium">Stock Mínimo</th>
                                <th class="text-left py-3 px-4 text-gray-300 text-sm font-medium">Estado</th>
                                <th class="text-left py-3 px-4 text-gray-300 text-sm font-medium">Acción</th>
                            </tr>
                        </thead>
                        <tbody>
        `;
        
        if (productos.length === 0) {
            html += `
                <tr>
                    <td colspan="6" class="text-center py-8 text-gray-400">
                        No hay productos para mostrar
                    </td>
                </tr>
            `;
        } else {
            productos.forEach(p => {
                const estado = p.stock <= 0 ? 'danger' : p.stock <= p.stock_minimo ? 'warning' : 'success';
                const estadoTexto = p.stock <= 0 ? 'Agotado' : p.stock <= p.stock_minimo ? 'Stock Bajo' : 'Normal';
                
                html += `
                    <tr class="table-row">
                        <td class="py-4 px-4 text-white">${p.nombre}</td>
                        <td class="py-4 px-4 text-gray-400 font-mono">${p.sku}</td>
                        <td class="py-4 px-4 text-white font-bold">${p.stock}</td>
                        <td class="py-4 px-4 text-gray-400">${p.stock_minimo}</td>
                        <td class="py-4 px-4">
                            <span class="badge-${estado} text-xs px-2 py-1 rounded-full">${estadoTexto}</span>
                        </td>
                        <td class="py-4 px-4">
                            <button onclick="ajustarStock(${p.id})" class="text-blue-400 hover:text-blue-300">
                                <i class="fas fa-sliders-h"></i>
                            </button>
                        </td>
                    </tr>
                `;
            });
        }
        
        html += `
                        </tbody>
                    </table>
                </div>
            </div>
        `;
        
        contentArea.innerHTML = html;
        
    } catch (error) {
        console.error('Error cargando stock:', error);
    }
}

window.abrirModalNuevo = function() {
    document.getElementById('modalTitle').textContent = 'Nuevo Producto';
    document.getElementById('productForm').reset();
    document.getElementById('productId').value = '';
    cargarCategoriasSelect();
    document.getElementById('productModal').classList.remove('hidden');
};

window.editarProducto = async function(id) {
    try {
        const productos = await db.sql(`SELECT * FROM productos WHERE id = ${id}`);
        if (productos.length === 0) return;
        
        const p = productos[0];
        
        document.getElementById('modalTitle').textContent = 'Editar Producto';
        document.getElementById('productId').value = id;
        document.getElementById('productName').value = p.nombre || '';
        document.getElementById('productSku').value = p.sku || '';
        document.getElementById('productPrice').value = p.precio || '';
        document.getElementById('productStock').value = p.stock || '';
        document.getElementById('productShortDesc').value = p.descripcion_corta || '';
        document.getElementById('productStatus').value = p.estado || 'activo';
        document.getElementById('productFeatured').checked = p.destacado === 1;
        
        await cargarCategoriasSelect(p.categoria);
        
        document.getElementById('productModal').classList.remove('hidden');
        
    } catch (error) {
        console.error('Error cargando producto:', error);
        mostrarMensaje('error', 'Error cargando producto');
    }
};

window.eliminarProducto = async function(id) {
    if (confirm('¿Estás seguro de eliminar este producto?')) {
        try {
            await db.sql(`DELETE FROM productos WHERE id = ${id}`);
            mostrarMensaje('success', 'Producto eliminado correctamente');
            mostrarSeccion('lista');
        } catch (error) {
            mostrarMensaje('error', 'Error eliminando producto');
        }
    }
};

window.guardarProductoRapido = async function(e) {
    e.preventDefault();
    
    const nombre = document.getElementById('quickName').value;
    const sku = document.getElementById('quickSku').value;
    const categoria = document.getElementById('quickCategory').value;

    try {

        mostrarMensaje('success', 'Producto creado correctamente');
        mostrarSeccion('lista');
        
    } catch (error) {
        console.error('Error guardando producto:', error);

};

window.ajustarStock = function(id) {
    const nuevaCantidad = prompt('Ingresar nueva cantidad de stock:');
    if (nuevaCantidad !== null && !isNaN(nuevaCantidad) && nuevaCantidad >= 0) {
        (async () => {
            try {
                await db.sql(`UPDATE productos SET stock = ${nuevaCantidad} WHERE id = ${id}`);
                mostrarMensaje('success', 'Stock actualizado correctamente');
                mostrarSeccion(currentSection);
            } catch (error) {
                mostrarMensaje('error', 'Error actualizando stock');
            }
        })();
    }
};

async function cargarCategoriasSelect(selected = null) {
    const categorias = await db.sql(`SELECT * FROM categorias ORDER BY nombre`);
    const select = document.getElementById('productCategory');
    select.innerHTML = '<option value="" class="bg-gray-900">Seleccionar categoría</option>';
    
    categorias.forEach(c => {
        const option = document.createElement('option');
        option.value = c.nombre;
        option.textContent = c.nombre;
        option.className = 'bg-gray-900';
        if (selected && c.nombre === selected) {
            option.selected = true;
        }
        select.appendChild(option);
    });
}

// ===========================================
// GUARDAR PRODUCTO DEL MODAL
// ===========================================
document.getElementById('productForm')?.addEventListener('submit', async function(e) {
    e.preventDefault();
    
    const id = document.getElementById('productId').value;
    const nombre = document.getElementById('productName').value;
    const sku = document.getElementById('productSku').value;
    const categoria = document.getElementById('productCategory').value;
    const precio = document.getElementById('productPrice').value;
    const stock = document.getElementById('productStock').value;
    const shortDesc = document.getElementById('productShortDesc').value || '';
    const estado = document.getElementById('productStatus').value;
    const destacado = document.getElementById('productFeatured').checked ? 1 : 0;
    
    try {
        if (id) {
            await db.sql(`
                UPDATE productos 
                SET nombre = '${nombre}', 
                    sku = '${sku}', 
                    categoria = '${categoria}', 
                    precio = ${precio}, 
                    stock = ${stock}, 
                    descripcion_corta = '${shortDesc}', 
                    estado = '${estado}', 
                    destacado = ${destacado}
                WHERE id = ${id}
            `);
            mostrarMensaje('success', 'Producto actualizado correctamente');
        } else {
            await db.sql(`
                INSERT INTO productos (nombre, sku, categoria, precio, stock, descripcion_corta, estado, destacado)
                VALUES ('${nombre}', '${sku}', '${categoria}', ${precio}, ${stock}, '${shortDesc}', '${estado}', ${destacado})
            `);
            mostrarMensaje('success', 'Producto creado correctamente');
        }
        
        cerrarModal();
        mostrarSeccion('lista');
        
    } catch (error) {
        console.error('Error guardando producto:', error);
        mostrarMensaje('error', 'Error al guardar producto');
    }
});

// INICIALIZACIÓN
// ===========================================
document.addEventListener('DOMContentLoaded', async function() {
    console.log('🚀 Inicializando panel de productos...');
    
    verificarAuth();
    await conectarDB();
    await mostrarSeccion('lista');
    
    // Actualizar fecha
    const date = new Date();
    document.getElementById('current-date').textContent = date.toLocaleDateString('es-ES', { 
        weekday: 'short', 
        day: 'numeric', 
        month: 'short' 
    });
    
    // Búsqueda en lista de productos
    document.getElementById('search-input')?.addEventListener('input', function(e) {
        const term = e.target.value.toLowerCase();
        const rows = document.querySelectorAll('.table-row');
        rows.forEach(row => {
            const text = row.textContent.toLowerCase();
            row.style.display = text.includes(term) ? '' : 'none';
        });
    });
});
