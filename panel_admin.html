<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InfiniHon - Panel de Administración</title>
    
    <!-- Import Map para SQLite Cloud -->
    <script type="importmap">
        {
            "imports": {
                "@sqlitecloud/drivers": "https://esm.sh/@sqlitecloud/drivers@latest"
            }
        }
    </script>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            font-family: 'Inter', sans-serif;
        }
        
        .font-mono-custom {
            font-family: 'JetBrains Mono', monospace;
        }
        
        body {
            background-color: #020617;
            background-image: radial-gradient(circle at 20% 30%, rgba(37, 99, 235, 0.08) 0%, transparent 40%),
                              radial-gradient(circle at 80% 70%, rgba(6, 182, 212, 0.08) 0%, transparent 40%);
            min-height: 100vh;
        }
        
        /* Glassmorphism */
        .glass-panel {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(59, 130, 246, 0.15);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }
        
        .glass-panel:hover {
            border-color: rgba(59, 130, 246, 0.3);
        }
        
        .glass-card {
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid rgba(59, 130, 246, 0.1);
            transition: all 0.3s ease;
        }
        
        .glass-card:hover {
            border-color: rgba(59, 130, 246, 0.3);
            transform: translateY(-2px);
            box-shadow: 0 8px 32px rgba(59, 130, 246, 0.15);
        }
        
        /* Sidebar estilo */
        .sidebar {
            background: rgba(2, 6, 23, 0.8);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-right: 1px solid rgba(59, 130, 246, 0.15);
        }
        
        .sidebar-item {
            transition: all 0.3s ease;
            border-left: 2px solid transparent;
        }
        
        .sidebar-item:hover {
            background: rgba(59, 130, 246, 0.1);
            border-left-color: #3b82f6;
        }
        
        .sidebar-item.active {
            background: rgba(59, 130, 246, 0.15);
            border-left-color: #3b82f6;
        }
        
        /* Tablas */
        .table-header {
            background: rgba(59, 130, 246, 0.1);
            border-bottom: 1px solid rgba(59, 130, 246, 0.2);
        }
        
        .table-row {
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            transition: all 0.3s ease;
        }
        
        .table-row:hover {
            background: rgba(59, 130, 246, 0.05);
        }
        
        /* Badges de estado */
        .badge-success {
            background: rgba(16, 185, 129, 0.1);
            color: #10b981;
            border: 1px solid rgba(16, 185, 129, 0.2);
        }
        
        .badge-warning {
            background: rgba(245, 158, 11, 0.1);
            color: #f59e0b;
            border: 1px solid rgba(245, 158, 11, 0.2);
        }
        
        .badge-danger {
            background: rgba(239, 68, 68, 0.1);
            color: #ef4444;
            border: 1px solid rgba(239, 68, 68, 0.2);
        }
        
        .badge-info {
            background: rgba(59, 130, 246, 0.1);
            color: #3b82f6;
            border: 1px solid rgba(59, 130, 246, 0.2);
        }
        
        /* Inputs */
        .admin-input {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(59, 130, 246, 0.2);
            color: white;
            transition: all 0.3s ease;
        }
        
        .admin-input:focus {
            outline: none;
            border-color: #3b82f6;
            box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.2);
        }
        
        /* Botones */
        .btn-primary {
            background: linear-gradient(135deg, #1e40af, #3b82f6);
            transition: all 0.3s ease;
        }
        
        .btn-primary:hover {
            background: linear-gradient(135deg, #1e3a8a, #2563eb);
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3);
        }
        
        .btn-secondary {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(59, 130, 246, 0.3);
            transition: all 0.3s ease;
        }
        
        .btn-secondary:hover {
            background: rgba(59, 130, 246, 0.1);
            border-color: rgba(59, 130, 246, 0.6);
        }
        
        .btn-danger {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            transition: all 0.3s ease;
        }
        
        .btn-danger:hover {
            background: rgba(239, 68, 68, 0.2);
            border-color: rgba(239, 68, 68, 0.6);
        }
        
        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        
        ::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.02);
        }
        
        ::-webkit-scrollbar-thumb {
            background: rgba(59, 130, 246, 0.3);
            border-radius: 4px;
        }
        
        ::-webkit-scrollbar-thumb:hover {
            background: rgba(59, 130, 246, 0.5);
        }
        
        /* Modal */
        .modal-glass {
            background: rgba(2, 6, 23, 0.95);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }

        .loading-spinner {
            border: 3px solid rgba(59, 130, 246, 0.1);
            border-radius: 50%;
            border-top: 3px solid #3b82f6;
            width: 24px;
            height: 24px;
            animation: spin 1s linear infinite;
            display: inline-block;
            margin-right: 8px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .error-message {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: #ef4444;
            padding: 1rem;
            border-radius: 0.75rem;
            margin: 1rem;
        }

        .success-message {
            background: rgba(16, 185, 129, 0.1);
            border: 1px solid rgba(16, 185, 129, 0.3);
            color: #10b981;
            padding: 1rem;
            border-radius: 0.75rem;
            margin: 1rem;
        }

        .stat-card {
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .stat-card:hover {
            transform: scale(1.02);
            border-color: rgba(59, 130, 246, 0.4);
        }

        /* Contenedor del gráfico con dimensiones fijas */
        .chart-container {
            position: relative;
            height: 250px;
            width: 100%;
            margin: 0 auto;
        }
    </style>
</head>

<script type="module">
// ===========================================
// CONFIGURACIÓN DE SQLITE CLOUD
// ===========================================
import { Database } from '@sqlitecloud/drivers';

const CONNECTION_STRING = 'sqlitecloud://cxaerd5fvk.g2.sqlite.cloud:8860/infinihon_store.db?apikey=cfHa2k4KOhBzxKL5g484dhAf4xlC4znLp5M6wzirgvc';

let db = null;
let currentUser = null;
let currentSection = 'dashboard';
let chart = null;
let chartInitialized = false;

// ===========================================
// CONEXIÓN A SQLITE CLOUD
// ===========================================
async function conectarDB() {
    try {
        console.log('🔄 Conectando a SQLite Cloud...');
        db = new Database(CONNECTION_STRING);
        
        // Probar conexión
        const result = await db.sql`SELECT 1 as test`;
        console.log('✅ Conectado a SQLite Cloud', result);
        
        return true;
    } catch (error) {
        console.error('❌ Error de conexión:', error);
        mostrarMensaje('error', 'Error de conexión a la base de datos');
        return false;
    }
}

// ===========================================
// MOSTRAR MENSAJES
// ===========================================
function mostrarMensaje(tipo, texto) {
    const container = document.getElementById('message-container');
    if (!container) return;
    
    const className = tipo === 'error' ? 'error-message' : 'success-message';
    container.innerHTML = `<div class="${className}">${texto}</div>`;
    
    setTimeout(() => {
        container.innerHTML = '';
    }, 5000);
}

// ===========================================
// VERIFICAR AUTENTICACIÓN
// ===========================================
function verificarAuth() {
    const savedUser = localStorage.getItem('user') || sessionStorage.getItem('user');
    
    if (!savedUser) {
        window.location.href = 'registro_admin.html';
        return false;
    }
    
    try {
        currentUser = JSON.parse(savedUser);
        
        if (currentUser.rol !== 'admin') {
            window.location.href = 'tienda.html';
            return false;
        }
        
        // Mostrar info del usuario
        document.getElementById('user-name').textContent = `${currentUser.nombre} ${currentUser.apellido || ''}`;
        document.getElementById('user-email').textContent = currentUser.email;
        
        const initials = (currentUser.nombre?.[0] || 'A') + (currentUser.apellido?.[0] || 'D');
        document.getElementById('user-initials').textContent = initials;
        
        return true;
        
    } catch (e) {
        window.location.href = 'registro_admin.html';
        return false;
    }
}

// ===========================================
// CERRAR SESIÓN
// ===========================================
window.logout = function() {
    localStorage.removeItem('user');
    sessionStorage.removeItem('user');
    window.location.href = 'registro_admin.html';
};

// ===========================================
// CAMBIAR DE SECCIÓN
// ===========================================
window.showSection = async function(section) {
    currentSection = section;
    
    // Actualizar menú
    document.querySelectorAll('.sidebar-item').forEach(item => {
        item.classList.remove('active');
        item.classList.add('text-gray-400');
    });
    
    document.getElementById(`menu-${section}`)?.classList.remove('text-gray-400');
    document.getElementById(`menu-${section}`)?.classList.add('active', 'text-white');
    
    // Actualizar títulos
    const titles = {
        'dashboard': 'Dashboard',
        'productos': 'Gestión de Productos',
        'pedidos': 'Gestión de Pedidos',
        'usuarios': 'Gestión de Usuarios',
        'categorias': 'Gestión de Categorías',
        'publicaciones': 'Gestión de Publicaciones',
        'configuracion': 'Configuración'
    };
    
    document.getElementById('section-title').textContent = titles[section] || 'Dashboard';
    document.getElementById('section-subtitle').textContent = `/ ${section}`;
    
    // Cargar contenido
    const contentArea = document.getElementById('content-area');
    contentArea.innerHTML = '<div class="text-center py-12"><div class="loading-spinner mx-auto mb-4"></div><p class="text-gray-400">Cargando...</p></div>';
    
    // Destruir gráfico si existe al cambiar de sección
    if (chart) {
        chart.destroy();
        chart = null;
        chartInitialized = false;
    }
    
    switch(section) {
        case 'dashboard':
            await cargarDashboard();
            break;
        case 'productos':
            await cargarProductos();
            break;
        case 'pedidos':
            await cargarPedidos();
            break;
        case 'usuarios':
            await cargarUsuarios();
            break;
        case 'categorias':
            await cargarCategorias();
            break;
        case 'publicaciones':
            await cargarPublicaciones();
            break;
        case 'configuracion':
            cargarConfiguracion();
            break;
    }
};

// ===========================================
// DASHBOARD
// ===========================================
async function cargarDashboard() {
    try {
        // Obtener estadísticas
        const stats = await db.sql(`
            SELECT 
                (SELECT COUNT(*) FROM productos) as total_productos,
                (SELECT COUNT(*) FROM usuarios) as total_usuarios,
                (SELECT COUNT(*) FROM pedidos) as total_pedidos,
                (SELECT COUNT(*) FROM pedidos WHERE estado = 'procesando') as pedidos_pendientes,
                (SELECT SUM(total) FROM pedidos) as ventas_totales,
                (SELECT SUM(total) FROM pedidos WHERE DATE(created_at) = DATE('now')) as ventas_hoy
        `);
        
        const s = stats[0];
        
        // Ventas por día (últimos 7 días)
        const ventasDiarias = await db.sql(`
            SELECT 
                DATE(created_at) as fecha,
                COUNT(*) as pedidos,
                SUM(total) as ventas
            FROM pedidos 
            WHERE created_at >= DATE('now', '-7 days')
            GROUP BY DATE(created_at)
            ORDER BY fecha
        `);
        
        const pedidosRecientes = await db.sql(`
            SELECT numero_pedido, total, estado, created_at 
            FROM pedidos 
            ORDER BY created_at DESC 
            LIMIT 4
        `);
        
        const productosStockBajo = await db.sql(`
            SELECT id, nombre, sku, stock, stock_minimo 
            FROM productos 
            WHERE stock <= stock_minimo AND stock > 0
            ORDER BY stock ASC
            LIMIT 5
        `);

function getEstadoColor(estado) {
    const colores = {
        'procesando': 'warning',
        'enviado': 'info',
        'entregado': 'success',
        'cancelado': 'danger'
    };
    return colores[estado] || 'info';
}

function inicializarGrafico(datos) {
    // Destruir gráfico anterior si existe
    if (chart) {
        chart.destroy();
        chart = null;
    }
    
    const ctx = document.getElementById('salesChart')?.getContext('2d');
    if (!ctx) {
        console.error('No se encontró el canvas del gráfico');
        return;
    }
    
    // Si no hay datos, crear datos de ejemplo
    let fechas, ventas;
    
    if (datos && datos.length > 0) {
        fechas = datos.map(d => d.fecha);
        ventas = datos.map(d => parseFloat(d.ventas || 0));
    } else {
        // Datos de ejemplo para mostrar
        const hoy = new Date();
        fechas = [];
        ventas = [];
        for (let i = 6; i >= 0; i--) {
            const fecha = new Date(hoy);
            fecha.setDate(hoy.getDate() - i);
            fechas.push(fecha.toLocaleDateString('es-ES', { day: '2-digit', month: '2-digit' }));
            ventas.push(Math.floor(Math.random() * 500) + 100);
        }
    }
    
    // Crear nuevo gráfico
    chart = new Chart(ctx, {
        type: 'line',
        data: {
            labels: fechas,
            datasets: [{
                label: 'Ventas ($)',
                data: ventas,
                borderColor: '#3b82f6',
                backgroundColor: 'rgba(59, 130, 246, 0.1)',
                borderWidth: 2,
                pointBackgroundColor: '#3b82f6',
                pointBorderColor: '#fff',
                pointBorderWidth: 2,
                pointRadius: 4,
                pointHoverRadius: 6,
                tension: 0.4,
                fill: true
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: true,
            plugins: {
                legend: {
                    display: false
                },
                tooltip: {
                    backgroundColor: '#1e293b',
                    titleColor: '#fff',
                    bodyColor: '#94a3b8',
                    borderColor: '#3b82f6',
                    borderWidth: 1
                }
            },
            scales: {
                y: {
                    beginAtZero: true,
                    grid: {
                        color: 'rgba(255, 255, 255, 0.05)',
                        drawBorder: false
                    },
                    ticks: {
                        color: '#9ca3af',
                        callback: function(value) {
                            return '$' + value;
                        }
                    }
                },
                x: {
                    grid: {
                        display: false
                    },
                    ticks: {
                        color: '#9ca3af'
                    }
                }
            },
            layout: {
                padding: {
                    top: 10,
                    bottom: 10
                }
            }
        }
    });
    
    chartInitialized = true;
}

window.actualizarGrafico = async function() {
    if (!chart) return;
    
    const period = document.getElementById('chart-period').value;
    try {
        const datos = await db.sql(`
            SELECT 
                DATE(created_at) as fecha,
                SUM(total) as ventas
            FROM pedidos 
            WHERE created_at >= DATE('now', '-${period} days')
            GROUP BY DATE(created_at)
            ORDER BY fecha
        `);
        
        let fechas, ventas;
        
        if (datos && datos.length > 0) {
            fechas = datos.map(d => d.fecha);
            ventas = datos.map(d => parseFloat(d.ventas || 0));
        } else {
            // Datos de ejemplo si no hay ventas
            const hoy = new Date();
            fechas = [];
            ventas = [];
            for (let i = period-1; i >= 0; i--) {
                const fecha = new Date(hoy);
                fecha.setDate(hoy.getDate() - i);
                fechas.push(fecha.toLocaleDateString('es-ES', { day: '2-digit', month: '2-digit' }));
                ventas.push(Math.floor(Math.random() * 500) + 100);
            }
        }
        
        chart.data.labels = fechas;
        chart.data.datasets[0].data = ventas;
        chart.update();
        
    } catch (error) {
        console.error('Error actualizando gráfico:', error);
    }
};

                                <button onclick="eliminarCategoria(${c.id})" class="text-red-400 hover:text-red-300">
                                    <i class="fas fa-trash"></i>
                                </button>
                            </div>
                        </div>
                    </div>
                `).join('')}
            </div>
        `;
        
    } catch (error) {
        console.error('Error cargando categorías:', error);
        document.getElementById('content-area').innerHTML = `
            <div class="error-message">Error cargando categorías: ${error.message}</div>
        `;
    }
}

// ===========================================
// GESTIÓN DE PUBLICACIONES
// ===========================================
async function cargarPublicaciones() {
    try {
        const publicaciones = await db.sql(`
            SELECT p.*, pr.nombre as producto_nombre 
            FROM publicaciones p
            LEFT JOIN productos pr ON p.producto_id = pr.id
            ORDER BY p.created_at DESC
        `);
        
        const contentArea = document.getElementById('content-area');
        
        contentArea.innerHTML = `
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-white text-xl font-light">Publicaciones</h2>
                <button onclick="nuevaPublicacion()" class="btn-primary px-4 py-2 rounded-xl text-sm text-white flex items-center gap-2">
                    <i class="fas fa-plus"></i>
                    Nueva Publicación
                </button>
            </div>
            
            <div class="grid md:grid-cols-3 gap-4">
                ${publicaciones.map(p => `
                    <div class="glass-card rounded-xl overflow-hidden">
                        <div class="h-32 bg-gradient-to-br from-blue-600/20 to-purple-600/20 flex items-center justify-center">
                            ${p.imagen ? `<img src="${p.imagen}" class="w-full h-full object-cover">` : `
                                <span class="text-4xl text-white/30">📸</span>
                            `}
                        </div>
                        <div class="p-4">
                            <div class="flex justify-between items-start mb-2">
                                <h3 class="text-white font-medium">${p.titulo || 'Sin título'}</h3>
                                <span class="badge-${p.tipo === 'evento' ? 'info' : p.tipo === 'tutorial' ? 'success' : 'warning'} text-xs px-2 py-1 rounded-full">
                                    ${p.tipo || 'producto'}
                                </span>
                            </div>
                            <p class="text-gray-400 text-xs">${p.descripcion || 'Sin descripción'}</p>
                            <div class="flex justify-between items-center mt-3">
                                <span class="text-gray-500 text-xs">
                                    <i class="far fa-heart mr-1"></i> ${p.likes || 0}
                                </span>
                                <div class="flex gap-2">
                                    <button onclick="editarPublicacion(${p.id})" class="text-blue-400 hover:text-blue-300 text-sm">
                                        <i class="fas fa-edit"></i>
                                    </button>
                                    <button onclick="eliminarPublicacion(${p.id})" class="text-red-400 hover:text-red-300 text-sm">
                                        <i class="fas fa-trash"></i>
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>
                `).join('')}
            </div>
        `;
        
    } catch (error) {
        console.error('Error cargando publicaciones:', error);
        document.getElementById('content-area').innerHTML = `
            <div class="error-message">Error cargando publicaciones: ${error.message}</div>
        `;
    }
}
