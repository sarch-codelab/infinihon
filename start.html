<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InfiniHon - Industrial Premium Loading</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Montserrat:wght@300;400;500;600;700;800;900&family=Rajdhani:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: #030712;
            overflow: hidden;
            font-family: 'Montserrat', sans-serif;
        }

        /* Overlay industrial */
        .industrial-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                repeating-linear-gradient(0deg, 
                    rgba(0, 255, 255, 0.02) 0px, 
                    rgba(0, 255, 255, 0.02) 2px,
                    transparent 2px, 
                    transparent 4px),
                repeating-linear-gradient(90deg, 
                    rgba(255, 0, 255, 0.02) 0px, 
                    rgba(255, 0, 255, 0.02) 2px,
                    transparent 2px, 
                    transparent 4px);
            pointer-events: none;
            z-index: 10;
        }

        /* Fondo con textura industrial */
        .industrial-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(circle at 20% 30%, rgba(0, 150, 255, 0.15) 0%, transparent 40%),
                radial-gradient(circle at 80% 70%, rgba(255, 0, 150, 0.15) 0%, transparent 40%),
                radial-gradient(circle at 40% 80%, rgba(100, 255, 255, 0.1) 0%, transparent 50%),
                url('data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSI4MCIgaGVpZ2h0PSI4MCIgdmlld0JveD0iMCAwIDgwIDgwIj48cGF0aCBkPSJNMCAwaDEwdjEwSDB6TTEwIDEwaDEwdjEwSDEwek0yMCAwaDEwdjEwSDIwek0zMCAxMGgxMHYxMEgzMHpNNDAgMGgxMHYxMEg0MHpNNTAgMTBoMTB2MTBINTB6TTYwIDBoMTB2MTBINjB6TTcwIDEwaDEwdjEwSDcwek0wIDIwaDEwdjEwSDB6TTEwIDMwaDEwdjEwSDEwek0yMCAyMGgxMHYxMEgyMHpNMzAgMzBoMTB2MTBIMHpNNDAgMjBoMTB2MTBINDB6TTUwIDMwaDEwdjEwSDUwek02MCAyMGgxMHYxMEg2MHpNNzAgMzBoMTB2MTBINzB6TTAgNDBoMTB2MTBIMHpNMTAgNTBoMTB2MTBIMTB6TTIwIDQwaDEwdjEwSDIwek0zMCA1MGgxMHYxMEgzMHpNNDAgNDBoMTB2MTBINDB6TTUwIDUwaDEwdjEwSDUwek02MCA0MGgxMHYxMEg2MHpNNzAgNTBoMTB2MTBINzB6TTAgNjBoMTB2MTBIMHpNMTAgNzBoMTB2MTBIMTB6TTIwIDYwaDEwdjEwSDIwek0zMCA3MGgxMHYxMEgzMHpNNDAgNjBoMTB2MTBINDB6TTUwIDcwaDEwdjEwSDUwek02MCA2MGgxMHYxMEg2MHpNNzAgNzBoMTB2MTBINzB6IiBmaWxsPSIjZmZmIiBmaWxsLW9wYWNpdHk9IjAuMDIiLz48L3N2Zz4=');
            z-index: 1;
            animation: bgMove 60s linear infinite;
        }

        @keyframes bgMove {
            0% { background-position: 0 0; }
            100% { background-position: 80px 80px; }
        }

        /* Efecto de escaneo industrial */
        .scan-line {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(180deg, 
                transparent 0%, 
                rgba(0, 255, 255, 0.05) 50%, 
                transparent 100%);
            transform: translateY(-100%);
            animation: scan 8s linear infinite;
            z-index: 5;
            pointer-events: none;
        }

        @keyframes scan {
            0% { transform: translateY(-100%); }
            100% { transform: translateY(200%); }
        }

        /* Contenedor principal */
        .industrial-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 20;
        }

        /* Panel central industrial */
        .industrial-panel {
            width: 800px;
            height: 600px;
            background: rgba(3, 7, 18, 0.95);
            border: 1px solid rgba(0, 255, 255, 0.3);
            box-shadow: 
                0 0 50px rgba(0, 255, 255, 0.2),
                inset 0 0 30px rgba(0, 255, 255, 0.1);
            position: relative;
            overflow: hidden;
            backdrop-filter: blur(10px);
        }

        /* Esquinas industriales */
        .corner {
            position: absolute;
            width: 50px;
            height: 50px;
            border: 3px solid #00ffff;
            filter: drop-shadow(0 0 10px #00ffff);
        }

        .corner-tl {
            top: 20px;
            left: 20px;
            border-right: none;
            border-bottom: none;
        }

        .corner-tr {
            top: 20px;
            right: 20px;
            border-left: none;
            border-bottom: none;
        }

        .corner-bl {
            bottom: 20px;
            left: 20px;
            border-right: none;
            border-top: none;
        }

        .corner-br {
            bottom: 20px;
            right: 20px;
            border-left: none;
            border-top: none;
        }

        /* Header del panel */
        .panel-header {
            padding: 30px 40px 20px;
            border-bottom: 1px solid rgba(0, 255, 255, 0.3);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .system-title {
            font-family: 'Rajdhani', sans-serif;
            color: #00ffff;
            font-size: 14px;
            letter-spacing: 4px;
            font-weight: 600;
            text-transform: uppercase;
            text-shadow: 0 0 10px #00ffff;
        }

        .system-status {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .status-led {
            width: 12px;
            height: 12px;
            background: #00ff00;
            border-radius: 50%;
            box-shadow: 0 0 20px #00ff00;
            animation: ledPulse 2s ease infinite;
        }

        @keyframes ledPulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .status-text {
            color: #00ff00;
            font-family: 'Rajdhani', sans-serif;
            font-size: 12px;
            letter-spacing: 2px;
        }

        /* Contenido principal */
        .panel-content {
            padding: 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Logo industrial */
        .industrial-logo {
            width: 180px;
            height: 180px;
            margin-bottom: 40px;
            position: relative;
        }

        .logo-base {
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #001122, #000814);
            border: 3px solid #00ffff;
            box-shadow: 
                0 0 50px rgba(0, 255, 255, 0.3),
                inset 0 0 30px rgba(0, 255, 255, 0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        .logo-base::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(45deg, 
                transparent 30%, 
                rgba(0, 255, 255, 0.1) 50%, 
                transparent 70%);
            animation: logoShine 4s linear infinite;
        }

        @keyframes logoShine {
            0% { transform: translateX(-100%) translateY(-100%) rotate(45deg); }
            100% { transform: translateX(100%) translateY(100%) rotate(45deg); }
        }

        .logo-base span {
            font-size: 80px;
            font-weight: 900;
            color: #00ffff;
            text-shadow: 
                0 0 30px #00ffff,
                2px 2px 0 #ff00ff,
                -2px -2px 0 #00ffff;
            font-family: 'Montserrat', sans-serif;
            letter-spacing: 10px;
        }

        /* Engranajes animados */
        .gear {
            position: absolute;
            width: 40px;
            height: 40px;
            border: 3px solid #00ffff;
            border-radius: 50%;
        }

        .gear::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 15px;
            height: 15px;
            background: #00ffff;
            border-radius: 50%;
            box-shadow: 0 0 20px #00ffff;
        }

        .gear::after {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            border: 3px solid #00ffff;
            border-radius: 50%;
            animation: gearRotate 10s linear infinite;
        }

        .gear1 {
            top: -20px;
            right: -20px;
        }

        .gear2 {
            bottom: -20px;
            left: -20px;
        }

        .gear1::after {
            border-color: #00ffff #ff00ff #00ffff #ff00ff;
        }

        .gear2::after {
            border-color: #ff00ff #00ffff #ff00ff #00ffff;
            animation-direction: reverse;
        }

        @keyframes gearRotate {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Sistema de barras de progreso industrial */
        .industrial-progress {
            width: 100%;
            max-width: 500px;
            margin: 30px 0;
        }

        .progress-item {
            margin-bottom: 25px;
        }

        .progress-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            font-family: 'Rajdhani', sans-serif;
            color: #94a3b8;
            font-size: 12px;
            letter-spacing: 1px;
        }

        .progress-label {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .progress-label i {
            color: #00ffff;
            font-size: 14px;
        }

        .progress-value {
            color: #00ffff;
            font-weight: 600;
            font-family: 'Montserrat', monospace;
        }

        .progress-track {
            height: 20px;
            background: rgba(0, 255, 255, 0.1);
            border: 1px solid rgba(0, 255, 255, 0.3);
            position: relative;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #00ffff, #ff00ff);
            position: relative;
            animation: progressPulse 2s ease infinite;
            transition: width 0.3s ease;
        }

        .progress-fill::after {
            content: '';
            position: absolute;
            top: 0;
            right: 0;
            width: 20px;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.5));
            filter: blur(5px);
        }

        @keyframes progressPulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.8; }
        }

        /* Medidor industrial */
        .industrial-meter {
            width: 300px;
            height: 300px;
            margin: 30px 0;
            position: relative;
        }

        .meter-circle {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 3px solid rgba(0, 255, 255, 0.3);
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .meter-fill {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 3px solid transparent;
            border-top: 3px solid #00ffff;
            border-right: 3px solid #ff00ff;
            animation: meterRotate 4s linear infinite;
        }

        @keyframes meterRotate {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .meter-center {
            width: 150px;
            height: 150px;
            background: rgba(0, 255, 255, 0.05);
            border-radius: 50%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border: 1px solid rgba(0, 255, 255, 0.3);
        }

        .meter-number {
            font-size: 48px;
            font-weight: 800;
            color: #00ffff;
            font-family: 'Montserrat', sans-serif;
            text-shadow: 0 0 30px #00ffff;
            line-height: 1;
        }

        .meter-unit {
            color: #94a3b8;
            font-size: 12px;
            letter-spacing: 2px;
            margin-top: 5px;
        }

        /* Sistema de líneas de datos */
        .data-lines {
            position: absolute;
            bottom: 40px;
            left: 40px;
            right: 40px;
            display: flex;
            justify-content: space-between;
        }

        .data-line {
            width: 30%;
            height: 2px;
            background: linear-gradient(90deg, transparent, #00ffff, transparent);
            animation: dataPulse 2s ease infinite;
        }

        .data-line:nth-child(2) {
            animation-delay: 0.5s;
            background: linear-gradient(90deg, transparent, #ff00ff, transparent);
        }

        .data-line:nth-child(3) {
            animation-delay: 1s;
            background: linear-gradient(90deg, transparent, #00ffff, transparent);
        }

        @keyframes dataPulse {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 1; }
        }

        /* Footer del panel */
        .panel-footer {
            position: absolute;
            bottom: 20px;
            left: 40px;
            right: 40px;
            display: flex;
            justify-content: space-between;
            color: rgba(0, 255, 255, 0.5);
            font-family: 'Rajdhani', sans-serif;
            font-size: 10px;
            letter-spacing: 2px;
        }

        /* Overlay de finalización */
        .completion-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #030712;
            z-index: 100;
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 1s ease;
        }

        .completion-overlay.show {
            opacity: 1;
            pointer-events: all;
        }

        .final-logo-industrial {
            text-align: center;
            transform: scale(0);
            transition: transform 1.5s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .completion-overlay.show .final-logo-industrial {
            transform: scale(1);
        }

        .final-logo-industrial .logo-block {
            width: 300px;
            height: 300px;
            background: linear-gradient(135deg, #001122, #000814);
            border: 4px solid #00ffff;
            box-shadow: 
                0 0 100px rgba(0, 255, 255, 0.5),
                inset 0 0 50px rgba(0, 255, 255, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 40px;
            position: relative;
            overflow: hidden;
        }

        .final-logo-industrial .logo-block span {
            font-size: 120px;
            font-weight: 900;
            color: #00ffff;
            text-shadow: 
                0 0 50px #00ffff,
                3px 3px 0 #ff00ff,
                -3px -3px 0 #00ffff;
            font-family: 'Montserrat', sans-serif;
            letter-spacing: 15px;
        }

        .final-logo-industrial h2 {
            color: white;
            font-size: 48px;
            font-weight: 800;
            margin-bottom: 15px;
            letter-spacing: 8px;
            text-shadow: 0 0 20px #00ffff;
        }

        .final-logo-industrial p {
            color: #00ffff;
            font-size: 18px;
            letter-spacing: 4px;
            font-weight: 300;
        }

        /* Contador binario */
        .binary-counter {
            position: fixed;
            top: 40px;
            right: 40px;
            color: rgba(0, 255, 255, 0.3);
            font-family: 'Montserrat', monospace;
            font-size: 12px;
            z-index: 25;
            writing-mode: vertical-rl;
            text-orientation: upright;
            letter-spacing: 5px;
        }
    </style>
</head>
<body>
    <!-- Overlay industrial -->
    <div class="industrial-overlay"></div>

    <!-- Fondo industrial -->
    <div class="industrial-bg"></div>

    <!-- Línea de escaneo -->
    <div class="scan-line"></div>

    <!-- Contador binario -->
    <div class="binary-counter" id="binaryCounter">101010101010</div>

    <!-- Contenedor principal -->
    <div class="industrial-container" id="industrialContainer">
        <div class="industrial-panel">
            <!-- Esquinas industriales -->
            <div class="corner corner-tl"></div>
            <div class="corner corner-tr"></div>
            <div class="corner corner-bl"></div>
            <div class="corner corner-br"></div>

            <!-- Header -->
            <div class="panel-header">
                <div class="system-title">INFINIHON INDUSTRIAL SYSTEMS v2.0</div>
                <div class="system-status">
                    <div class="status-led"></div>
                    <span class="status-text">SYSTEM ONLINE</span>
                </div>
            </div>

            <!-- Contenido -->
            <div class="panel-content">
                <!-- Logo con engranajes -->
                <div class="industrial-logo">
                    <div class="logo-base">
                        <span>I</span>
                    </div>
                    <div class="gear gear1"></div>
                    <div class="gear gear2"></div>
                </div>

                <!-- Medidor industrial -->
                <div class="industrial-meter">
                    <div class="meter-circle">
                        <div class="meter-fill"></div>
                        <div class="meter-center">
                            <span class="meter-number" id="meterPercentage">0</span>
                            <span class="meter-unit">POR CIENTO</span>
                        </div>
                    </div>
                </div>

                <!-- Barras de progreso -->
                <div class="industrial-progress">
                    <div class="progress-item">
                        <div class="progress-header">
                            <div class="progress-label">
                                <i>⚡</i>
                                <span>POWER CORE</span>
                            </div>
                            <span class="progress-value" id="powerValue">0%</span>
                        </div>
                        <div class="progress-track">
                            <div class="progress-fill" id="powerBar" style="width: 0%"></div>
                        </div>
                    </div>

                    <div class="progress-item">
                        <div class="progress-header">
                            <div class="progress-label">
                                <i>🔷</i>
                                <span>QUANTUM PROCESSOR</span>
                            </div>
                            <span class="progress-value" id="quantumValue">0%</span>
                        </div>
                        <div class="progress-track">
                            <div class="progress-fill" id="quantumBar" style="width: 0%"></div>
                        </div>
                    </div>

                    <div class="progress-item">
                        <div class="progress-header">
                            <div class="progress-label">
                                <i>🔮</i>
                                <span>NEURAL INTERFACE</span>
                            </div>
                            <span class="progress-value" id="neuralValue">0%</span>
                        </div>
                        <div class="progress-track">
                            <div class="progress-fill" id="neuralBar" style="width: 0%"></div>
                        </div>
                    </div>
                </div>

                <!-- Líneas de datos -->
                <div class="data-lines">
                    <div class="data-line"></div>
                    <div class="data-line"></div>
                    <div class="data-line"></div>
                </div>
            </div>

            <!-- Footer -->
            <div class="panel-footer">
                <span>SECURE CONNECTION: ESTABLISHED</span>
                <span>ENCRYPTION: AES-256</span>
                <span>STATUS: INITIALIZING</span>
            </div>
        </div>
    </div>

    <!-- Overlay de finalización -->
    <div class="completion-overlay" id="completionOverlay">
        <div class="final-logo-industrial">
            <div class="logo-block">
                <span>I</span>
            </div>
            <h2>INFINIHON</h2>
            <p>INDUSTRIAL PREMIUM SYSTEMS</p>
        </div>
    </div>

    <script>
        // Datos de progreso
        let progress = 0;
        const powerBar = document.getElementById('powerBar');
        const quantumBar = document.getElementById('quantumBar');
        const neuralBar = document.getElementById('neuralBar');
        const powerValue = document.getElementById('powerValue');
        const quantumValue = document.getElementById('quantumValue');
        const neuralValue = document.getElementById('neuralValue');
        const meterPercentage = document.getElementById('meterPercentage');
        const binaryCounter = document.getElementById('binaryCounter');
        const industrialContainer = document.getElementById('industrialContainer');
        const completionOverlay = document.getElementById('completionOverlay');

        // Actualizar contador binario
        function updateBinaryCounter(value) {
            const binary = Math.floor(value).toString(2).padStart(12, '0');
            binaryCounter.textContent = binary;
        }

        // Crear efecto de chispas
        function createSpark() {
            const spark = document.createElement('div');
            spark.style.cssText = `
                position: fixed;
                width: 4px;
                height: 4px;
                background: #00ffff;
                border-radius: 50%;
                left: ${Math.random() * 100}%;
                top: ${Math.random() * 100}%;
                box-shadow: 0 0 20px #00ffff;
                animation: sparkFade 1s ease forwards;
                z-index: 30;
            `;
            document.body.appendChild(spark);
            
            setTimeout(() => {
                spark.remove();
            }, 1000);
        }

        // Añadir estilo de chispas
        const sparkStyle = document.createElement('style');
        sparkStyle.textContent = `
            @keyframes sparkFade {
                0% { transform: scale(1); opacity: 1; }
                100% { transform: scale(3); opacity: 0; }
            }
        `;
        document.head.appendChild(sparkStyle);

        // Simular progreso industrial
        const interval = setInterval(() => {
            // Incremento variable para simular procesos industriales
            const increment = Math.random() * 2 + 0.5;
            progress += increment;
            
            if (progress >= 100) {
                progress = 100;
                clearInterval(interval);
                
                // Valores finales
                powerBar.style.width = '100%';
                quantumBar.style.width = '100%';
                neuralBar.style.width = '100%';
                powerValue.textContent = '100%';
                quantumValue.textContent = '100%';
                neuralValue.textContent = '100%';
                meterPercentage.textContent = '100';
                updateBinaryCounter(100);
                
                // Cambiar texto de estado
                document.querySelector('.status-text').textContent = 'SYSTEM READY';
                document.querySelector('.panel-footer span:last-child').textContent = 'STATUS: COMPLETE';
                
                // Mostrar overlay final
                setTimeout(() => {
                    industrialContainer.style.opacity = '0';
                    industrialContainer.style.transition = 'opacity 1s ease';
                    
                    setTimeout(() => {
                        completionOverlay.classList.add('show');
                        
                        // Crear múltiples chispas
                        for (let i = 0; i < 50; i++) {
                            setTimeout(() => {
                                createSpark();
                            }, i * 50);
                        }
                        
                        // Redirigir
                        setTimeout(() => {
                            window.location.href = 'index.html';
                        }, 3000);
                    }, 1000);
                }, 500);
                
                return;
            }
            
            // Actualizar barras con variaciones industriales
            const powerProgress = Math.min(progress + (Math.random() * 5 - 2.5), 100);
            const quantumProgress = Math.min(progress + (Math.random() * 5 - 2.5), 100);
            const neuralProgress = Math.min(progress + (Math.random() * 5 - 2.5), 100);
            
            powerBar.style.width = `${Math.max(0, powerProgress)}%`;
            quantumBar.style.width = `${Math.max(0, quantumProgress)}%`;
            neuralBar.style.width = `${Math.max(0, neuralProgress)}%`;
            
            powerValue.textContent = `${Math.floor(powerProgress)}%`;
            quantumValue.textContent = `${Math.floor(quantumProgress)}%`;
            neuralValue.textContent = `${Math.floor(neuralProgress)}%`;
            meterPercentage.textContent = Math.floor(progress);
            
            // Actualizar contador binario
            updateBinaryCounter(progress);
            
            // Crear chispas aleatorias
            if (Math.random() > 0.7) {
                createSpark();
            }
            
        }, 100);

        // Efecto de interferencia al mover el mouse
        document.addEventListener('mousemove', (e) => {
            const x = (e.clientX / window.innerWidth - 0.5) * 20;
            const y = (e.clientY / window.innerHeight - 0.5) * 20;
            
            document.querySelector('.industrial-panel').style.transform = 
                `perspective(1000px) rotateY(${x}deg) rotateX(${-y}deg)`;
        });

        // Precargar siguiente página
        window.addEventListener('load', () => {
            const link = document.createElement('link');
            link.rel = 'prefetch';
            link.href = 'index.html';
            document.head.appendChild(link);
        });
    </script>
</body>
</html>
